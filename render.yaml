services:
  - type: web
    name: password-analyzer
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: password-analyzer-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: password-analyzer-db
    type: postgresql
    plan: free